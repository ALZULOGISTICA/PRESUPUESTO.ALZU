<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historial de Presupuestos — ALZU</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--rojo:#CC0000;--negro:#1a1a1a;--gris:#f5f5f5}
  body{background:#e8e8e8;font-family:'Barlow',sans-serif;color:var(--negro);padding:24px}
  .top-bar{max-width:960px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between}
  .top-bar h1{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--rojo);letter-spacing:1px}
  .btn{padding:9px 20px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;border-radius:3px;transition:all .15s}
  .btn-gris{background:#555;color:#fff}.btn-gris:hover{background:#333}
  .search-bar{max-width:960px;margin:0 auto 16px;display:flex;gap:10px}
  .search-bar input{flex:1;padding:9px 14px;border:1.5px solid #ddd;border-radius:3px;font-family:'Barlow',sans-serif;font-size:14px;outline:none}
  .search-bar input:focus{border-color:var(--rojo)}
  .filter-btn{padding:8px 16px;border:1.5px solid #ddd;background:#fff;border-radius:3px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;transition:all .15s}
  .filter-btn.active,.filter-btn:hover{background:var(--rojo);color:#fff;border-color:var(--rojo)}
  .grid{max-width:960px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .card{background:#fff;border-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.1);overflow:hidden;transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
  .card-header{background:var(--rojo);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .card-nro{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px}
  .card-fecha{font-size:12px;opacity:.85}
  .card-body{padding:14px 16px}
  .card-cliente{font-size:16px;font-weight:700;margin-bottom:4px}
  .card-campana{font-size:13px;color:#666;margin-bottom:10px}
  .card-total{font-size:18px;font-weight:900;color:var(--rojo);margin-bottom:12px}
  .card-meta{font-size:12px;color:#999;margin-bottom:14px}
  .card-actions{display:flex;gap:8px}
  .card-btn{flex:1;padding:8px;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:700;font-size:12px;border-radius:3px;transition:all .15s}
  .card-btn-ver{background:var(--rojo);color:#fff}.card-btn-ver:hover{background:#aa0000}
  .card-btn-del{background:#eee;color:#666}.card-btn-del:hover{background:#ffdddd;color:var(--rojo)}
  .empty{max-width:960px;margin:60px auto;text-align:center;color:#aaa;font-size:16px}
  .loading{max-width:960px;margin:60px auto;text-align:center;color:#aaa;font-size:16px}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto;padding:30px 20px}
  .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
  .modal{background:#fff;max-width:860px;width:100%;border-radius:4px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3)}
  .modal-header{background:var(--rojo);color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
  .modal-header h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700}
  .modal-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1}
  .modal-body{padding:24px}
  .modal-section{margin-bottom:16px}
  .modal-label{font-size:11px;font-weight:700;color:var(--rojo);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .modal-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
  .modal-field{background:#f5f5f5;padding:8px 12px;border-radius:3px}
  .modal-field .lbl{font-size:10px;font-weight:700;color:var(--rojo);text-transform:uppercase;letter-spacing:.4px}
  .modal-field .val{font-size:14px;font-weight:600;margin-top:2px}
  table.modal-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
  table.modal-table th{background:var(--rojo);color:#fff;padding:8px 10px;font-weight:700;font-size:12px}
  table.modal-table th:not(:first-child){text-align:center}
  table.modal-table th:nth-child(4),table.modal-table th:nth-child(5){text-align:right}
  table.modal-table td{padding:7px 10px;border-bottom:1px solid #eee}
  table.modal-table tr:nth-child(even) td{background:#fafafa}
  table.modal-table td:not(:first-child){text-align:center}
  table.modal-table td:nth-child(4),table.modal-table td:nth-child(5){text-align:right}
  .modal-total-block{display:flex;justify-content:flex-end;margin-top:12px}
  .modal-totals{width:300px}
  .modal-total-row{display:flex;justify-content:space-between;padding:5px 10px;border-bottom:1px solid #eee;font-size:13px}
  .modal-total-row.grand{background:var(--rojo);color:#fff;font-weight:700;font-size:14px;border:none;padding:8px 10px}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="top-bar">
  <h1>📋 Historial de Presupuestos</h1>
  <button class="btn btn-gris" onclick="window.location.href='index.html'">← Nuevo presupuesto</button>
</div>

<div class="search-bar">
  <input type="text" id="buscador" placeholder="Buscar por cliente, campaña o número..." oninput="filtrar()">
</div>

<div id="grid" class="grid">
  <div class="loading">Cargando presupuestos...</div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-titulo">Presupuesto</h2>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQNKm3jwmP3r59eDzIbG3tIulZkm1qtNQ",
    authDomain: "alzupresupuestos.firebaseapp.com",
    databaseURL: "https://alzupresupuestos-default-rtdb.firebaseio.com",
    projectId: "alzupresupuestos",
    storageBucket: "alzupresupuestos.firebasestorage.app",
    messagingSenderId: "340768090431",
    appId: "1:340768090431:web:dc208c4f22393326ae8b8a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let todos = [];

  function showToast(msg, color='#222'){
    const t = document.getElementById('toast');
    t.textContent=msg; t.style.background=color;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  function renderCards(lista){
    const grid = document.getElementById('grid');
    if(!lista.length){ grid.innerHTML='<div class="empty">No hay presupuestos guardados todavía.</div>'; return; }
    // Sort by date desc
    lista.sort((a,b) => new Date(b.guardadoEn||0) - new Date(a.guardadoEn||0));
    grid.innerHTML = lista.map(p => \`
      <div class="card">
        <div class="card-header">
          <span class="card-nro">Nro. \${p.nro||'—'}</span>
          <span class="card-fecha">\${p.fecha||''}</span>
        </div>
        <div class="card-body">
          <div class="card-cliente">\${p.cliente||'Sin cliente'}</div>
          <div class="card-campana">\${p.campana||''}</div>
          <div class="card-total">\${p.totalNeto||'—'}</div>
          <div class="card-meta">Guardado: \${p.guardadoEn||''}</div>
          <div class="card-actions">
            <button class="card-btn card-btn-ver" onclick="verModal('\${p._key}')">👁 Ver detalle</button>
            <button class="card-btn card-btn-del" onclick="eliminar('\${p._key}')">🗑 Eliminar</button>
          </div>
        </div>
      </div>
    \`).join('');
  }

  window.filtrar = function(){
    const q = document.getElementById('buscador').value.toLowerCase();
    if(!q){ renderCards(todos); return; }
    renderCards(todos.filter(p =>
      (p.cliente||'').toLowerCase().includes(q) ||
      (p.campana||'').toLowerCase().includes(q) ||
      (p.nro||'').toLowerCase().includes(q)
    ));
  }

  window.eliminar = function(key){
    if(!confirm('¿Seguro que querés eliminar este presupuesto?')) return;
    remove(ref(db, 'presupuestos/'+key))
      .then(()=>showToast('Presupuesto eliminado','#555'))
      .catch(()=>showToast('Error al eliminar','#CC0000'));
  }

  window.verModal = function(key){
    const p = todos.find(x=>x._key===key);
    if(!p) return;
    document.getElementById('modal-titulo').textContent = \`Presupuesto \${p.nro||''} — \${p.cliente||''}\`;
    const items = (p.items||[]).filter(i=>i.desc||i.unit).map(i=>\`
      <tr>
        <td>\${i.desc||''}</td>
        <td>\${i.cant||''}</td>
        <td>\${i.dias||''}</td>
        <td>\${i.unit||''}</td>
        <td>\${i.total||''}</td>
      </tr>
    \`).join('');
    document.getElementById('modal-body').innerHTML = \`
      <div class="modal-grid3">
        <div class="modal-field"><div class="lbl">Cliente</div><div class="val">\${p.cliente||'—'}</div></div>
        <div class="modal-field"><div class="lbl">Contacto</div><div class="val">\${p.contacto||'—'}</div></div>
        <div class="modal-field"><div class="lbl">Campaña</div><div class="val">\${p.campana||'—'}</div></div>
        <div class="modal-field"><div class="lbl">Fecha</div><div class="val">\${p.fecha||'—'}</div></div>
        <div class="modal-field"><div class="lbl">Forma de pago</div><div class="val">\${p.pago||'—'}</div></div>
        <div class="modal-field"><div class="lbl">Validez</div><div class="val">\${p.validez||'—'}</div></div>
      </div>
      <table class="modal-table">
        <thead><tr><th style="text-align:left">Descripción</th><th>Cant.</th><th>Días</th><th style="text-align:right">Costo Unit.</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>\${items}</tbody>
      </table>
      <div class="modal-total-block">
        <div class="modal-totals">
          <div class="modal-total-row"><span>Subtotal</span><span>\${p.subtotal||'—'}</span></div>
          <div class="modal-total-row"><span>Coordinación agencia</span><span>\${p.coordinacion||'—'}</span></div>
          <div class="modal-total-row grand"><span>TOTAL NETO CON FEE</span><span>\${p.totalNeto||'—'}</span></div>
        </div>
      </div>
    \`;
    document.getElementById('modal').classList.add('open');
  }

  window.cerrarModal = function(){ document.getElementById('modal').classList.remove('open'); }
  document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) window.cerrarModal(); });

  // Load data
  onValue(ref(db,'presupuestos'), snap => {
    todos = [];
    if(snap.exists()){
      snap.forEach(child=>{ todos.push({_key:child.key, ...child.val()}); });
    }
    renderCards(todos);
  });
</script>
</body>
</html>
